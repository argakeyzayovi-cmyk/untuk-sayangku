<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Pendek - Leoraa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #000; overflow: hidden; }

        .feed {
            width: 100vw;
            height: 100vh;
            position: relative;
            transition: transform 0.4s ease-out;
        }

        .video-slide {
            width: 100%;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info {
            position: absolute;
            bottom: 90px;
            left: 15px;
            z-index: 10;
            color: #fff;
        }
        .info h3 { font-size: 17px; margin-bottom: 6px; }
        .info p { font-size: 14px; opacity: 0.9; max-width: 85%; }

        .actions {
            position: absolute;
            bottom: 110px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            align-items: center;
            z-index: 10;
        }
        .btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.18);
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .count { font-size: 12px; margin-top: 4px; }

        nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            background: rgba(0,0,0,0.7);
            z-index: 10;
        }
        nav button {
            background: none;
            border: none;
            color: #fff;
            font-size: 19px;
        }
    </style>
</head>
<body>

<div class="feed" id="feed">
    <!-- Video 1 -->
    <div class="video-slide">
        <video src="video1.mp4" autoplay muted loop playsinline></video>
        <div class="info">
            <h3>@akun_saya</h3>
            <p>Selamat datang di situs video pendek buatan Keyza ✨</p>
        </div>
        <div class="actions">
            <div><button class="btn">❤️</button><div class="count">15,2rb</div></div>
            <div><button class="btn">💬</button><div class="count">1.203</div></div>
            <div><button class="btn">↗️</button><div class="count">421</div></div>
        </div>
    </div>

    <!-- Video 2 -->
    <div class="video-slide">
        <video src="video2.mp4" muted loop playsinline></video>
        <div class="info">
            <h3>@konten_seru</h3>
            <p>Geser layar ke atas/bawah untuk ganti video ⬆️⬇️</p>
        </div>
        <div class="actions">
            <div><button class="btn">❤️</button><div class="count">9,8rb</div></div>
            <div><button class="btn">💬</button><div class="count">675</div></div>
            <div><button class="btn">↗️</button><div class="count">210</div></div>
        </div>
    </div>

    <!-- Video 3 -->
    <div class="video-slide">
        <video src="video3.mp4" muted loop playsinline></video>
        <div class="info">
            <h3>@karya_kamu</h3>
            <p>Bisa ditambah video lain sesuai keinginanmu 🚀</p>
        </div>
        <div class="actions">
            <div><button class="btn">❤️</button><div class="count">22rb</div></div>
            <div><button class="btn">💬</button><div class="count">2.150</div></div>
            <div><button class="btn">↗️</button><div class="count">930</div></div>
        </div>
    </div>
</div>

<nav>
    <button>🏠</button>
    <button>🔍</button>
    <button>➕</button>
    <button>📩</button>
    <button>👤</button>
</nav>

<script>
    const feed = document.getElementById('feed');
    const slides = document.querySelectorAll('.video-slide');
    let currentIndex = 0;
    let startY = 0;
    let isSwiping = false;

    feed.addEventListener('touchstart', (e) => {
        startY = e.touches[0].clientY;
        isSwiping = true;
    });

    feed.addEventListener('touchend', (e) => {
        if (!isSwiping) return;
        isSwiping = false;
        const endY = e.changedTouches[0].clientY;
        const diffY = startY - endY;

        if (Math.abs(diffY) > 60) {
            if (diffY > 0 && currentIndex < slides.length - 1) {
                currentIndex++;
            } else if (diffY < 0 && currentIndex > 0) {
                currentIndex--;
            }
            updatePosition();
            playCurrentVideo();
        }
    });

    function updatePosition() {
        feed.style.transform = `translateY(-${currentIndex * 100}vh)`;
    }

    function playCurrentVideo() {
        slides.forEach((slide, idx) => {
            const vid = slide.querySelector('video');
            idx === currentIndex ? vid.play() : vid.pause();
        });
    }

    playCurrentVideo();
</script>

</body>
      </html>
